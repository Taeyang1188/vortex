<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>구의 나선 — 시간의 보텍스 지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0817;
  --surface:#161027;
  --surface2:#1E1633;
  --line:rgba(233,180,76,.14);
  --gold:#E9B44C;
  --gold-dim:#8A6B2E;
  --rose:#E4638E;
  --blue:#7FA8E8;
  --zero:#B9A8E8;
  --flow:#FF8FB8;
  --flow-glow:rgba(255,143,184,.95);
  --flow-glow2:rgba(228,99,142,.5);
  --text:#EDE6F5;
  --muted:#928AA8;
  --foot:#6B6382;
  --btn-ink:#1A1206;
  --shadow:0 18px 50px rgba(0,0,0,.55);
  --glass:rgba(22,16,39,.82);
}
html.light{
  --bg:#F3EDDF;
  --surface:#FBF7EC;
  --surface2:#EDE4D0;
  --line:rgba(122,90,20,.20);
  --gold:#9A6E12;
  --gold-dim:#C4A25E;
  --rose:#BE3A6A;
  --blue:#33589F;
  --zero:#6E54B8;
  --flow:#D84B82;
  --flow-glow:rgba(216,75,130,.75);
  --flow-glow2:rgba(190,58,106,.35);
  --text:#2A2138;
  --muted:#6E6584;
  --foot:#948B7A;
  --btn-ink:#FFF9EC;
  --shadow:0 14px 40px rgba(90,70,30,.14);
  --glass:rgba(251,247,236,.86);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--bg)}
html.light{color-scheme:light}
html:not(.light){color-scheme:dark}
body{
  background:var(--bg) !important;
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  font-weight:300;
  line-height:1.7;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(127,90,200,.14), transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 110%, rgba(233,180,76,.06), transparent 60%);
  -webkit-font-smoothing:antialiased;
  transition:background-color .4s, color .4s;
}
html.light body{
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(122,90,200,.09), transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 110%, rgba(154,110,18,.08), transparent 60%);
}
.wrap{max-width:520px;margin:0 auto;padding:0 20px 80px}

/* ── floating controls ── */
.menu-btn{
  position:fixed;top:16px;left:16px;z-index:60;width:44px;height:44px;
  border-radius:13px;background:var(--glass);backdrop-filter:blur(8px);
  border:1px solid var(--line);cursor:pointer;
  display:flex;flex-direction:column;gap:5px;align-items:center;justify-content:center;
}
.menu-btn span{display:block;width:18px;height:1.5px;background:var(--gold);border-radius:2px}
.menu-btn span:nth-child(2){width:12px;align-self:center;margin-left:-6px}
.top-right{position:fixed;top:16px;right:16px;z-index:60;display:flex;gap:8px}
.pill{
  height:44px;min-width:44px;padding:0 13px;border-radius:13px;
  background:var(--glass);backdrop-filter:blur(8px);
  border:1px solid var(--line);color:var(--gold);cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;letter-spacing:.08em;
  display:flex;align-items:center;justify-content:center;transition:border .2s;
}
.pill:hover,.pill:focus{border-color:var(--gold-dim)}
.pill.theme{font-size:17px;padding:0}

/* ── header ── */
header{padding:66px 0 8px;text-align:center}
.eyebrow{
  font-size:11px;letter-spacing:.42em;color:var(--gold);
  text-transform:uppercase;font-weight:400;margin-bottom:14px;
}
h1{
  font-family:'Gowun Batang',serif;font-weight:700;
  font-size:clamp(30px,8vw,38px);letter-spacing:.06em;line-height:1.3;
}
h1 .nine{color:var(--gold)}
.sub{color:var(--muted);font-size:13.5px;margin-top:10px;letter-spacing:.02em}

/* ── clock ── */
.clock{text-align:center;margin:34px 0 6px;font-family:'Gowun Batang',serif}
.clock .time{
  font-size:clamp(52px,15vw,68px);font-weight:700;letter-spacing:.05em;
  font-variant-numeric:tabular-nums;line-height:1;
}
.clock .time .colon{animation:blink 2s step-end infinite;color:var(--gold)}
.clock .date{color:var(--muted);font-size:13px;margin-top:8px;font-family:'Noto Sans KR',sans-serif;letter-spacing:.14em}
@keyframes blink{50%{opacity:.25}}
.balance-badge{
  display:none;margin:14px auto 0;width:fit-content;
  border:1px solid var(--gold);color:var(--gold);
  font-size:12px;letter-spacing:.2em;padding:6px 16px;border-radius:99px;
}
.balance-badge.on{display:block;animation:pulseSoft 2.4s ease-in-out infinite}

/* ── map ── */
.map-frame{position:relative;margin:26px auto 0;max-width:440px}
svg{display:block;width:100%;height:auto}
.ring{fill:none;stroke:var(--line);stroke-width:1}
.tick{stroke:var(--muted);stroke-opacity:.22;stroke-width:1}
.tick.major{stroke-opacity:.45;stroke-width:1.4}
.tick.now{stroke:var(--gold);stroke-opacity:1;stroke-width:2}
.circuit{fill:none;stroke:var(--rose);stroke-width:1.4;opacity:.4}
.circuit-flow{
  fill:none;stroke:var(--flow);stroke-width:2.4;stroke-linecap:round;
  stroke-dasharray:16 120;
  filter:drop-shadow(0 0 5px var(--flow-glow)) drop-shadow(0 0 12px var(--flow-glow2));
  animation:flow 4.5s linear infinite;
}
@keyframes flow{to{stroke-dashoffset:-272}}
.spark{fill:#FFE3EE;filter:drop-shadow(0 0 4px var(--flow)) drop-shadow(0 0 10px var(--flow-glow))}
html.light .spark{fill:#FFF}
.triangle{fill:none;stroke:var(--gold);stroke-width:1.6;opacity:.75}
.spiral{fill:none;stroke:var(--gold);stroke-opacity:.3;stroke-width:1;transform-origin:200px 200px;animation:spin 90s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.center-plate{fill:var(--surface);stroke:var(--line)}
.node{cursor:pointer}
.node circle.bg{fill:var(--surface);stroke-width:1.5;transition:fill .25s}
.node.circ circle.bg{stroke:var(--blue)}
.node.tri circle.bg{stroke:var(--gold)}
.node text{pointer-events:none;user-select:none}
.node .digit{font-family:'Gowun Batang',serif;font-size:22px;font-weight:700;fill:var(--text)}
.node.tri .digit{fill:var(--gold)}
.node.circ .digit{fill:var(--blue)}
.node .word{font-family:'Noto Sans KR',sans-serif;font-size:9.5px;fill:var(--muted);letter-spacing:.08em}
.node:hover circle.bg,.node:focus circle.bg{fill:var(--surface2)}
.node.sel circle.bg{fill:var(--surface2);stroke-width:2.5}
.node .halo{fill:none;stroke-width:2;opacity:0}
.node.hl-hour .halo.h{stroke:var(--gold);opacity:1;animation:pulseR 3s ease-in-out infinite}
.node.hl-min .halo.m{stroke:var(--rose);opacity:1;animation:pulseR 3s ease-in-out infinite .5s}
.node.hl-total circle.bg{stroke:var(--gold);stroke-width:2.5;filter:drop-shadow(0 0 10px var(--flow-glow2))}
@keyframes pulseR{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes pulseSoft{0%,100%{opacity:.65}50%{opacity:1}}
.center-digit{font-family:'Gowun Batang',serif;font-size:52px;font-weight:700;fill:var(--gold)}
.center-label{font-family:'Noto Sans KR',sans-serif;font-size:10px;fill:var(--muted);letter-spacing:.3em}
.legend{
  display:flex;justify-content:center;gap:20px;flex-wrap:wrap;
  margin-top:14px;font-size:11.5px;color:var(--muted);letter-spacing:.04em;
}
.legend span{display:flex;align-items:center;gap:6px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.dot.g{border:2px solid var(--gold)}
.dot.r{border:2px solid var(--rose)}
.dot.f{background:var(--gold);box-shadow:0 0 8px var(--flow-glow2)}

/* ── sections ── */
.section-title{
  font-family:'Gowun Batang',serif;font-size:19px;font-weight:700;
  margin:52px 0 4px;letter-spacing:.04em;
  display:flex;align-items:center;gap:12px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--line)}
.section-sub{color:var(--muted);font-size:12.5px;margin-bottom:18px}
.reading{
  background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:26px 24px;box-shadow:var(--shadow);
  transition:background-color .4s;
}
.reading .sentence{font-family:'Gowun Batang',serif;font-size:17.5px;line-height:2;text-align:center}
.reading .sentence b{font-weight:700}
.reading .sentence .g{color:var(--gold)}
.reading .sentence .r{color:var(--rose)}
.roots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:22px}
.root-card{
  background:var(--surface2);border-radius:12px;padding:14px 8px;text-align:center;
  border:1px solid transparent;cursor:pointer;transition:border .25s;
}
.root-card:hover{border-color:var(--line)}
.root-card .k{font-size:10.5px;color:var(--muted);letter-spacing:.18em;margin-bottom:6px}
.root-card .n{font-family:'Gowun Batang',serif;font-size:30px;font-weight:700;line-height:1}
.root-card .w{font-size:12px;margin-top:6px;color:var(--text)}
.root-card.hour .n{color:var(--gold)}
.root-card.min .n{color:var(--rose)}
.root-card.total{border-color:var(--gold-dim)}
.root-card.total .n{color:var(--gold)}
.calc{
  text-align:center;color:var(--muted);font-size:12px;margin-top:16px;
  letter-spacing:.06em;font-variant-numeric:tabular-nums;
}

/* ── inner GPS ── */
.gps-strip{display:flex;justify-content:center;gap:7px;align-items:stretch}
.chip{
  background:var(--surface2);border:1px solid var(--line);border-radius:12px;
  padding:11px 0 9px;width:58px;text-align:center;
}
.chip .d{font-family:'Gowun Batang',serif;font-size:26px;font-weight:700;line-height:1}
.chip .w{font-size:10px;color:var(--muted);margin-top:5px;letter-spacing:.05em}
.chip.tri .d{color:var(--gold)}
.chip.circ .d{color:var(--blue)}
.chip.zero .d{color:var(--zero)}
.chip.sep{width:auto;background:none;border:none;display:flex;align-items:center;font-size:22px;color:var(--gold);padding:0 3px}
.chip.wave{animation:pop .55s ease both}
@keyframes pop{0%{transform:translateY(0)}35%{transform:translateY(-9px)}100%{transform:translateY(0)}}
.coord-line{text-align:center;font-family:'Gowun Batang',serif;font-size:15px;margin-top:14px;letter-spacing:.04em}
.gps-q{margin-top:20px;background:var(--surface2);border-radius:14px;padding:18px 18px 16px}
.q-label{font-size:10.5px;letter-spacing:.26em;color:var(--gold)}
.q-text{font-family:'Gowun Batang',serif;font-size:17px;margin:8px 0 14px;line-height:1.7}
.q-btns{display:flex;gap:10px}
.qb{
  flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);
  background:var(--surface);color:var(--text);font-size:14.5px;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:border .2s,transform .12s;
}
.qb:active{transform:scale(.97)}
.qb.yes:hover,.qb.yes:focus{border-color:var(--gold)}
.qb.no:hover,.qb.no:focus{border-color:var(--rose)}
.q-fb{display:none;font-size:13.5px;margin-top:14px;line-height:1.85}
.q-fb.show{display:block;animation:rise .3s ease}
.q-fb .g{color:var(--gold)}
.next-line{
  margin-top:18px;text-align:center;font-size:13px;color:var(--muted);
  border-top:1px dashed var(--line);padding-top:16px;line-height:1.8;
}
.next-line b{color:var(--gold);font-weight:500}
.next-line .cnt{font-variant-numeric:tabular-nums;color:var(--text);font-weight:500}

/* ── meaning card ── */
.meaning{
  margin-top:18px;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:26px 24px;display:none;box-shadow:var(--shadow);
}
.meaning.show{display:block;animation:rise .4s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.meaning .head{display:flex;align-items:baseline;gap:14px;margin-bottom:4px}
.meaning .big{font-family:'Gowun Batang',serif;font-size:44px;font-weight:700;color:var(--gold);line-height:1}
.meaning.circ-c .big{color:var(--blue)}
.meaning .nm{font-family:'Gowun Batang',serif;font-size:21px;font-weight:700}
.meaning .en{font-size:11px;letter-spacing:.3em;color:var(--muted)}
.meaning .tag{
  display:inline-block;font-size:10.5px;letter-spacing:.14em;color:var(--gold);
  border:1px solid var(--gold-dim);border-radius:99px;padding:3px 10px;margin:8px 6px 4px 0;
}
.meaning .tag.blue{color:var(--blue);border-color:var(--blue)}
.meaning .poem{font-family:'Gowun Batang',serif;font-size:15.5px;color:var(--text);margin:12px 0 10px;line-height:1.9}
.meaning .desc{font-size:13.5px;color:var(--muted);line-height:1.85}
.meaning .ask{
  margin-top:16px;padding:14px 16px;background:var(--surface2);
  border-left:2px solid var(--gold);border-radius:0 10px 10px 0;font-size:13.5px;
}
.meaning .ask .q{color:var(--gold);font-size:11px;letter-spacing:.24em;display:block;margin-bottom:4px}

/* ── today ── */
.today-row{display:flex;align-items:center;gap:20px}
.today-num{
  font-family:'Gowun Batang',serif;font-size:64px;font-weight:700;color:var(--gold);
  line-height:1;min-width:70px;text-align:center;
  border:1.5px solid var(--gold-dim);border-radius:18px;padding:14px 8px;
}
.today-name{font-family:'Gowun Batang',serif;font-size:22px;font-weight:700}
.today-line{font-family:'Gowun Batang',serif;font-size:15px;color:var(--muted);margin-top:16px;line-height:1.9}
.reading.today{cursor:pointer;transition:border .25s}
.reading.today:hover{border-color:var(--gold-dim)}

/* ── input ── */
.calc-box{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:var(--shadow)}
.input-row{display:flex;gap:10px}
input[type=text]{
  flex:1;min-width:0;background:var(--surface2);border:1px solid var(--line);
  border-radius:12px;padding:14px 16px;color:var(--text);
  font-size:17px;font-family:'Gowun Batang',serif;letter-spacing:.1em;
  outline:none;transition:border .25s;
}
input[type=text]:focus{border-color:var(--gold)}
input::placeholder{color:var(--muted);opacity:.6;font-family:'Noto Sans KR',sans-serif;font-size:13.5px;letter-spacing:0}
button.go{
  background:var(--gold);color:var(--btn-ink);border:none;border-radius:12px;
  padding:0 22px;font-size:14.5px;font-weight:700;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;letter-spacing:.06em;transition:transform .15s, filter .2s;
}
button.go:hover{filter:brightness(1.08)}
button.go:active{transform:scale(.97)}
button.go:focus-visible,input:focus-visible,.node:focus-visible,.root-card:focus-visible,.pill:focus-visible,.menu-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.hint{font-size:11.5px;color:var(--muted);margin-top:10px;letter-spacing:.03em}
.chain{
  display:none;margin-top:20px;text-align:center;
  font-family:'Gowun Batang',serif;font-size:20px;letter-spacing:.06em;
  font-variant-numeric:tabular-nums;flex-wrap:wrap;justify-content:center;gap:6px 12px;align-items:center;
}
.chain.show{display:flex;animation:rise .4s ease}
.chain .arrow{color:var(--gold-dim);font-size:15px}
.chain .final{
  color:var(--gold);font-size:26px;font-weight:700;
  border:1.5px solid var(--gold);border-radius:50%;
  width:46px;height:46px;display:inline-flex;align-items:center;justify-content:center;
}
.err{display:none;color:var(--rose);font-size:12.5px;margin-top:12px;text-align:center}
.err.show{display:block}

/* ── share card ── */
.share-box{text-align:center}
.card-preview{display:none;margin-top:20px}
.card-preview.show{display:block;animation:rise .4s ease}
.card-preview img{width:100%;border-radius:16px;border:1px solid var(--line);display:block}
.share-actions{display:flex;gap:10px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.share-actions .go{padding:12px 22px}
.share-actions a.go{text-decoration:none;display:inline-flex;align-items:center}
.making{opacity:.5;pointer-events:none}

/* ── menu / drawer / modal ── */
.backdrop{position:fixed;inset:0;background:rgba(5,3,12,.62);z-index:70;opacity:0;pointer-events:none;transition:opacity .3s}
html.light .backdrop{background:rgba(60,45,20,.35)}
.backdrop.on{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;left:0;bottom:0;width:min(320px,86vw);
  background:var(--surface);border-right:1px solid var(--line);z-index:80;
  transform:translateX(-105%);transition:transform .35s cubic-bezier(.22,.9,.3,1);
  display:flex;flex-direction:column;padding:30px 22px 26px;overflow-y:auto;
}
.drawer.on{transform:none}
.drawer .d-title{font-family:'Gowun Batang',serif;font-size:20px;font-weight:700;margin-bottom:4px}
.drawer .d-title .nine{color:var(--gold)}
.drawer .d-sub{font-size:11.5px;color:var(--muted);margin-bottom:24px}
.d-label{font-size:10.5px;letter-spacing:.26em;color:var(--gold);margin:18px 0 8px;display:block}
.d-item{
  display:block;width:100%;text-align:left;background:var(--surface2);
  border:1px solid transparent;border-radius:12px;padding:13px 15px;margin-bottom:8px;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;
  text-decoration:none;cursor:pointer;transition:border .2s;line-height:1.5;
}
.d-item:hover,.d-item:focus{border-color:var(--gold-dim)}
.d-item small{display:block;color:var(--muted);font-size:11.5px;margin-top:2px}
.d-foot{margin-top:auto;padding-top:24px;border-top:1px solid var(--line)}
.d-foot .maker{font-size:12.5px;color:var(--muted);margin-bottom:12px}
.d-foot .maker b{color:var(--text);font-weight:500;font-family:'Gowun Batang',serif;font-size:14px}
.icon-row{display:flex;gap:10px}
.ic{
  width:44px;height:44px;border:1px solid var(--line);border-radius:12px;
  display:flex;align-items:center;justify-content:center;color:var(--muted);
  background:var(--surface2);cursor:pointer;text-decoration:none;transition:all .2s;
}
.ic:hover,.ic:focus{color:var(--gold);border-color:var(--gold-dim)}
.ic svg{width:20px;height:20px}
.modal{position:fixed;inset:0;z-index:90;display:none;align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.modal .sheet{
  background:var(--surface);border:1px solid var(--line);
  border-radius:22px 22px 0 0;max-height:84vh;overflow-y:auto;
  width:100%;max-width:520px;padding:26px 22px 40px;
  animation:sheetUp .35s cubic-bezier(.22,.9,.3,1);
}
@keyframes sheetUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sheet-head h3{font-family:'Gowun Batang',serif;font-size:19px;font-weight:700}
.x-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--surface2);color:var(--muted);font-size:16px;cursor:pointer}
.sheet-sub{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.8}
.guide-item{display:flex;gap:16px;padding:16px 2px;border-bottom:1px solid var(--line);align-items:flex-start}
.guide-item:last-child{border-bottom:none}
.guide-item .gd{font-family:'Gowun Batang',serif;font-size:30px;font-weight:700;min-width:42px;text-align:center;line-height:1.2}
.guide-item.tri .gd{color:var(--gold)}
.guide-item.circ .gd{color:var(--blue)}
.guide-item.zero .gd{color:var(--zero)}
.guide-item .gn{font-family:'Gowun Batang',serif;font-size:15.5px;font-weight:700}
.guide-item .gn small{font-size:10px;letter-spacing:.2em;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-weight:400;margin-left:8px}
.guide-item p{font-size:13px;color:var(--muted);line-height:1.8;margin-top:4px}
.kakao-sheet{text-align:center}
.kakao-sheet img{width:min(280px,80%);border-radius:16px;margin:14px auto;display:block}
.kakao-sheet .kid{font-family:'Gowun Batang',serif;font-size:17px;color:var(--gold);letter-spacing:.08em}

/* ── keypad map ── */
.pad-row{display:flex;align-items:stretch;gap:12px;margin-bottom:10px}
.row-tag{
  min-width:66px;display:flex;flex-direction:column;justify-content:center;align-items:center;
  border-radius:10px;border:1px solid var(--line);background:var(--surface2);
}

const $=id=>document.getElementById(id);
const root = n => { n=Math.abs(n); while(n>9){ n=String(n).split('').reduce((a,b)=>a+ +b,0);} return n===0?9:n; };
const chainOf = s => {
  let steps=[s.replace(/^0+(?=\d)/,'')];
  let n=s.split('').reduce((a,b)=>a+ +b,0);
  if(s.length>1) steps.push(String(n));
  while(n>9){ n=String(n).split('').reduce((a,b)=>a+ +b,0); steps.push(String(n)); }
  if(steps[steps.length-1]==='0') steps.push('9');
  return steps;
};
const wordOf = d => d===0?ZERO:M[d];
const chipClass = d => d===0?'zero':(M[d].type==='tri'?'tri':'circ');

/* ═════════ build map ═════════ */
const CX=200,CY=200,R=140;
const pos=n=>{const a=((n%9)*40-90)*Math.PI/180;return[CX+R*Math.cos(a),CY+R*Math.sin(a)];};
{
  let tk='';
  for(let i=0;i<60;i++){
    const a=(i*6-90)*Math.PI/180,r1=i%5===0?180:184,r2=194;
    tk+=`<line class="tick ${i%5===0?'major':''}" data-min="${i}"
      x1="${CX+r1*Math.cos(a)}" y1="${CY+r1*Math.sin(a)}"
      x2="${CX+r2*Math.cos(a)}" y2="${CY+r2*Math.sin(a)}"/>`;
  }
  $('ticks').innerHTML=tk;
}
const pathFrom=arr=>arr.map((n,i)=>{const[x,y]=pos(n);return(i?'L':'M')+x+' '+y;}).join(' ')+' Z';
const circuitD=pathFrom([1,2,4,8,7,5]);
$('circuitPath').setAttribute('d',circuitD);
$('circuitFlow').setAttribute('d',circuitD);
$('trianglePath').setAttribute('d',pathFrom([3,6,9]));
{
  let d='',turns=2.4,steps=140;
  for(let i=0;i<=steps;i++){
    const a=(i/steps)*turns*2*Math.PI-Math.PI/2, r=6+(i/steps)*40;
    d+=(i?'L':'M')+(CX+r*Math.cos(a))+' '+(CY+r*Math.sin(a))+' ';
  }
  $('spiralPath').setAttribute('d',d);
}
const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(!reduceMotion){
  const NS='http://www.w3.org/2000/svg';
  [0,2.25].forEach(delay=>{
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('class','spark');c.setAttribute('r','3.2');
    const am=document.createElementNS(NS,'animateMotion');
    am.setAttribute('dur','4.5s');am.setAttribute('repeatCount','indefinite');
    am.setAttribute('begin',delay+'s');am.setAttribute('path',circuitD);
    c.appendChild(am);$('sparks').appendChild(c);
  });
}else{$('circuitFlow').style.display='none';}
{
  let html='';
  for(let n=1;n<=9;n++){
    const[x,y]=pos(n),m=M[n];
    html+=`<g class="node ${m.type}" data-n="${n}" tabindex="0" role="button" aria-label="${n}">

/* ═════════ live clock ═════════ */
let cur={h:-1,m:-1};
const S={};
function dateLine(now){
  const d=t(UI.days)[now.getDay()];
  return L==='ko'
    ? `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()}. ${d}요일`
    : `${d} · ${UI.months.en[now.getMonth()]} ${now.getDate()} · ${now.getFullYear()}`;
}
function tick(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes();
  const hh=String(h).padStart(2,'0'),mm=String(m).padStart(2,'0');
  $('timeDisp').innerHTML=hh+'<span class="colon">:</span>'+mm;
  const cnt=$('nextCount');
  if(cnt)cnt.textContent=60-now.getSeconds();
  if(cur.h===h&&cur.m===m)return;
  cur={h,m};

  $('dateDisp').textContent=dateLine(now);

  /* inner GPS */
  const digits=[...hh,':',...mm];
  $('gpsStrip').innerHTML=digits.map((c,i)=>{
    if(c===':')return `<div class="chip sep">:</div>`;
    const d=+c;
    return `<div class="chip ${chipClass(d)} wave" style="animation-delay:${i*.08}s">
      <div class="d">${d}</div><div class="w">${t(wordOf(d).name)}</div></div>`;
  }).join('');
  $('coordLine').textContent=
    `${t(wordOf(+hh[0]).name)} · ${t(wordOf(+hh[1]).name)}  ⁚  ${t(wordOf(+mm[0]).name)} · ${t(wordOf(+mm[1]).name)}`;

  const qd=m%10;
  $('qText').textContent=t(QQ[qd]);
  const fb=$('qFb');fb.className='q-fb';
  $('qYes').onclick=()=>{fb.innerHTML=t(UI.fbYes);fb.classList.add('show');};
  $('qNo').onclick=()=>{fb.innerHTML=fbNoLine(qd);fb.classList.add('show');};

  const nm2=(m+1)%60, nRoot=nm2===0?9:root(nm2);
  $('nextLine').innerHTML=nextLineHtml(60-now.getSeconds(),nRoot);

  /* roots */
  const hRoot=root([...hh].reduce((a,b)=>a+ +b,0)||9);
  const mRoot=m===0?9:root(m);
  const tSum=[...hh+mm].reduce((a,b)=>a+ +b,0);
  const tRoot=tSum===0?9:root(tSum);

  $('hourN').textContent=hRoot; $('hourW').textContent=t(M[hRoot].name);
  $('minN').textContent=mRoot;  $('minW').textContent=t(M[mRoot].name);
  $('totalN').textContent=tRoot;$('totalW').textContent=t(M[tRoot].name);
  $('centerDigit').textContent=tRoot;
  $('calcLine').textContent=
    `${hh} : ${mm}  →  ${[...hh+mm].join(' + ')} = ${tSum}${tSum>9?`  →  ${tRoot}`:''}`;
  $('sentence').innerHTML=rootLine(hRoot,mRoot,tRoot);

  document.querySelectorAll('.node').forEach(g=>{
    g.classList.remove('hl-hour','hl-min','hl-total');
    const n=+g.dataset.n;
    if(n===hRoot)g.classList.add('hl-hour');
    if(n===mRoot)g.classList.add('hl-min');
    if(n===tRoot)g.classList.add('hl-total');
  });
  document.querySelectorAll('.tick').forEach(x=>x.classList.toggle('now',+x.dataset.min===m));
  $('balanceBadge').classList.toggle('on',h%12===4&&m===20);

  /* today */
  const dStr=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const dSum=[...dStr].reduce((a,b)=>a+ +b,0);
  const dRoot=root(dSum);
  $('todayN').textContent=dRoot;
  $('todayName').textContent=`${t(M[dRoot].name)} · ${M[dRoot].en}`;
  $('todayCalc').textContent=`${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} → ${dSum} → ${dRoot}`;
  $('todayLine').textContent=`“${t(M[dRoot].poem)}”`;
  const tc=$('todayCard');
  tc.onclick=()=>renderMeaning(meaningCard,dRoot,t(UI.ctxToday));
  tc.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();renderMeaning(meaningCard,dRoot,t(UI.ctxToday));}};

  Object.assign(S,{hh,mm,hRoot,mRoot,tRoot,dRoot,dateStr:dateLine(now)});

  const bind=(id,n,label)=>{
    const el=$(id);
    el.onclick=()=>renderMeaning(meaningCard,n,label);
    el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();renderMeaning(meaningCard,n,label);}};
  };
  bind('cardHour',hRoot,t(UI.ctxHour));
  bind('cardMin',mRoot,t(UI.ctxMin));
  bind('cardTotal',tRoot,t(UI.ctxNow));
}

/* ═════════ solver ═════════ */
function solve(){
  const raw=$('numInput').value.replace(/[\s,.\-:]/g,'');
  $('errMsg').classList.remove('show');
  if(!raw||!/^\d+$/.test(raw)){
    $('errMsg').classList.add('show');
    $('chain').classList.remove('show');
    $('numMeaning').classList.remove('show');
    return;
  }
  const steps=chainOf(raw), fin=+steps[steps.length-1];
  $('chain').innerHTML=steps.map((s,i)=>{
    const last=i===steps.length-1;
    return(i?'<span class="arrow">➜</span>':'')+(last?`<span class="final">${s}</span>`:`<span>${s}</span>`);
  }).join('');
  $('chain').classList.add('show');
  renderMeaning($('numMeaning'),fin,L==='ko'?`${raw}의 뿌리 수`:`Root of ${raw}`);
}
$('goBtn').addEventListener('click',solve);
$('numInput').addEventListener('keydown',e=>{if(e.key==='Enter')solve();});

/* ═════════ share card ═════════ */
function pal(){
  const light=document.documentElement.classList.contains('light');
  return light
    ? {bg:'#F3EDDF',node:'#FBF7EC',text:'#2A2138',muted:'#6E6584',foot:'#948B7A',
       gold:'#9A6E12',rose:'#BE3A6A',blue:'#33589F',
       glowA:'rgba(122,90,200,.10)',glowB:'rgba(154,110,18,.09)',glowT:'rgba(154,110,18,.55)'}
    : {bg:'#0B0817',node:'#161027',text:'#EDE6F5',muted:'#928AA8',foot:'#6B6382',
       gold:'#E9B44C',rose:'#E4638E',blue:'#7FA8E8',
       glowA:'rgba(127,90,200,.22)',glowB:'rgba(233,180,76,.10)',glowT:'rgba(233,180,76,.9)'};
}
function drawMiniMap(ctx,cx,cy,Rm,P){
  const p=n=>{const a=((n%9)*40-90)*Math.PI/180;return[cx+Rm*Math.cos(a),cy+Rm*Math.sin(a)];};
  const poly=(arr,color,w)=>{
    ctx.beginPath();
    arr.forEach((n,i)=>{const[x,y]=p(n);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.closePath();ctx.strokeStyle=color;ctx.lineWidth=w;ctx.stroke();
  };
  poly([1,2,4,8,7,5],P.rose+'',3.5);
  poly([3,6,9],P.gold,3.5);
  for(let n=1;n<=9;n++){
    const[x,y]=p(n),tri=M[n].type==='tri';
    if(n===S.hRoot){ctx.beginPath();ctx.arc(x,y,68,0,7);ctx.strokeStyle=P.gold;ctx.lineWidth=3;ctx.stroke();}
    if(n===S.mRoot){ctx.beginPath();ctx.arc(x,y,78,0,7);ctx.strokeStyle=P.rose;ctx.lineWidth=3;ctx.stroke();}
    ctx.save();
    if(n===S.tRoot){ctx.shadowColor=P.glowT;ctx.shadowBlur=30;}
    ctx.beginPath();ctx.arc(x,y,54,0,7);
    ctx.fillStyle=P.node;ctx.fill();
    ctx.strokeStyle=tri?P.gold:P.blue;
    ctx.lineWidth=n===S.tRoot?6:3;ctx.stroke();
    ctx.restore();
    ctx.fillStyle=tri?P.gold:P.blue;
    ctx.font='700 46px "Gowun Batang"';ctx.textAlign='center';
    ctx.fillText(n,x,y+8);
    ctx.fillStyle=P.muted;ctx.font='400 19px "Noto Sans KR"';
    ctx.fillText(t(M[n].name),x,y+36);
  }
}
async function buildCard(){
  await document.fonts.load('700 150px "Gowun Batang"');
  await document.fonts.load('400 30px "Noto Sans KR"');
  const P=pal(), W=1080,H=1350;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=P.bg;ctx.fillRect(0,0,W,H);
  let g=ctx.createRadialGradient(W/2,-100,0,W/2,-100,900);
  g.addColorStop(0,P.glowA);g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  g=ctx.createRadialGradient(W/2,H+100,0,W/2,H+100,700);
  g.addColorStop(0,P.glowB);g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  ctx.fillStyle=P.gold;ctx.font='400 26px "Noto Sans KR"';
  ctx.fillText('V O R T E X   N U M E R O L O G Y',W/2,96);
  ctx.fillStyle=P.text;ctx.font='700 148px "Gowun Batang"';
  ctx.fillText(S.hh,W/2-118,258);
  ctx.fillText(S.mm,W/2+118,258);
  ctx.fillStyle=P.gold;ctx.fillText(':',W/2,250);
  ctx.fillStyle=P.muted;ctx.font='400 30px "Noto Sans KR"';
  ctx.fillText(S.dateStr,W/2,320);

  drawMiniMap(ctx,W/2,690,235,P);

  const l1 = L==='ko'
    ? `${t(M[S.hRoot].name)}의 시간 위로 ${t(M[S.mRoot].name)}의 분이 흐르고,`
    : `Upon the hour of ${t(M[S.hRoot].name)} flows a minute of ${t(M[S.mRoot].name)},`;
  const l2pre = L==='ko' ? '둘이 모여 지금, ' : 'and together they point, now, to ';
  const l2key = t(M[S.tRoot].name);
  const l2post = L==='ko' ? '을 가리킵니다.' : '.';
  ctx.fillStyle=P.text;ctx.font='400 40px "Gowun Batang"';
  ctx.fillText(l1,W/2,1078);
  const wPre=ctx.measureText(l2pre).width;
  ctx.font='700 40px "Gowun Batang"';
  const wKey=ctx.measureText(l2key).width;
  ctx.font='400 40px "Gowun Batang"';
  const wPost=ctx.measureText(l2post).width;
  let x0=W/2-(wPre+wKey+wPost)/2;
  ctx.textAlign='left';
  ctx.fillText(l2pre,x0,1142); x0+=wPre;
  ctx.fillStyle=P.gold;ctx.font='700 40px "Gowun Batang"';
  ctx.fillText(l2key,x0,1142); x0+=wKey;
  ctx.fillStyle=P.text;ctx.font='400 40px "Gowun Batang"';
  ctx.fillText(l2post,x0,1142);
  ctx.textAlign='center';

  const sum = L==='ko'
    ? `시 ${S.hRoot} · 분 ${S.mRoot} · 지금 ${S.tRoot} · 오늘 ${S.dRoot} ${t(M[S.dRoot].name)}`
    : `H ${S.hRoot} · M ${S.mRoot} · Now ${S.tRoot} · Today ${S.dRoot} ${t(M[S.dRoot].name)}`;
  ctx.fillStyle=P.muted;ctx.font='400 28px "Noto Sans KR"';
  ctx.fillText(sum,W/2,1226);
  ctx.fillStyle=P.foot;ctx.font='400 24px "Noto Sans KR"';
  ctx.fillText(L==='ko'?'✦ 구九의 나선 — 성찰을 위한 상징 체계':'✦ Spiral of Nine — a symbolic system for reflection',W/2,1296);
  return cv;
}
$('shareBtn').addEventListener('click',async()=>{
  const btn=$('shareBtn');
  btn.classList.add('making');btn.textContent=t(UI.making);
  try{
    const cv=await buildCard();
    const blob=await new Promise(r=>cv.toBlob(r,'image/png'));
    const url=URL.createObjectURL(blob);
    $('cardImg').src=url;
    $('cardPreview').classList.add('show');
    const acts=$('shareActions');acts.innerHTML='';
    const file=new File([blob],'vortex-nine.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      const b=document.createElement('button');
      b.className='go';b.textContent=t(UI.shareAct);
      b.onclick=()=>navigator.share({files:[file],title:'Spiral of Nine'}).catch(()=>{});
      acts.appendChild(b);
    }
    const a=document.createElement('a');
    a.className='go';a.textContent=t(UI.saveAct);
    a.href=url;a.download='vortex-nine.png';
    acts.appendChild(a);
    $('cardPreview').scrollIntoView({behavior:'smooth',block:'nearest'});
  }finally{
    btn.classList.remove('making');btn.textContent=t(UI.shareBtn);
  }
});

/* ═════════ language & theme ═════════ */
function renderGuide(){
  $('guideList').innerHTML=GUIDE.map(g=>`
    <div class="guide-item ${g.t}">
      <div class="gd">${g.n}</div>
      <div><div class="gn">${t(g.nm)}<small>${g.en}</small></div><p>${t(g.txt)}</p></div>
    </div>`).join('');
}
function applyLang(){
  document.documentElement.lang=L;
  $('langBtn').textContent=L==='ko'?'EN':'KO';
  $('mainTitle').innerHTML=t(UI.title);
  $('mainSub').textContent=t(UI.sub);
  $('balanceBadge').textContent=t(UI.balance);
  $('centerLabel').textContent=t(UI.centerLabel);
  $('lgH').textContent=t(UI.lgH);$('lgM').textContent=t(UI.lgM);$('lgT').textContent=t(UI.lgT);
  $('stGps').textContent=t(UI.stGps);$('ssGps').textContent=t(UI.ssGps);
  $('qLabel').textContent=t(UI.qLabel);
  $('qYes').textContent=t(UI.yes);$('qNo').textContent=t(UI.no);
  $('stNow').textContent=t(UI.stNow);$('ssNow').textContent=t(UI.ssNow);
  $('kHour').textContent=t(UI.kHour);$('kMin').textContent=t(UI.kMin);$('kTotal').textContent=t(UI.kTotal);
  $('stToday').textContent=t(UI.stToday);$('ssToday').textContent=t(UI.ssToday);
  $('stSolve').textContent=t(UI.stSolve);$('ssSolve').textContent=t(UI.ssSolve);
  $('numInput').placeholder=t(UI.placeholder);
  $('goBtn').textContent=t(UI.go);
  $('solveHint').textContent=t(UI.solveHint);
  $('errMsg').textContent=t(UI.err);
  $('stShare').textContent=t(UI.stShare);$('ssShare').textContent=t(UI.ssShare);
  $('shareBtn').textContent=t(UI.shareBtn);
  $('longPressHint').textContent=t(UI.longPress);
  $('footText').innerHTML=t(UI.foot);
  $('dTitle').innerHTML=t(UI.dTitle);$('dSub').textContent=t(UI.dSub);
  $('dLabel1').textContent=t(UI.dLabel1);
  $('openGuide').innerHTML=t(UI.openGuide);
  $('openPad').innerHTML=t(UI.openPad);
  $('dLabel2').textContent=t(UI.dLabel2);
  $('lk1').textContent=t(UI.lk1);$('lk2').textContent=t(UI.lk2);$('lk3').textContent=t(UI.lk3);
  $('lk4t').textContent=t(UI.lk4);
  $('makerLine').innerHTML=t(UI.maker);
  $('guideTitle').textContent=t(UI.guideTitle);$('guideSub').textContent=t(UI.guideSub);
  $('kakaoTitle').textContent=t(UI.kakaoTitle);$('kakaoHint').innerHTML=t(UI.kakaoHint);
  document.querySelectorAll('[data-word]').forEach(el=>{
    el.textContent=t(M[+el.dataset.word].name);
  });
  renderGuide();
  renderPad();
  // 열려 있던 해석/체인은 닫아 언어 혼선 방지
  meaningCard.classList.remove('show');
  $('numMeaning').classList.remove('show');
  $('chain').classList.remove('show');
  cur={h:-1,m:-1}; tick();
}
$('langBtn').addEventListener('click',()=>{L=L==='ko'?'en':'ko';applyLang();});
$('themeBtn').addEventListener('click',()=>{
  const light=document.documentElement.classList.toggle('light');
  $('themeBtn').textContent=light?'☾':'☀';
});

applyLang();
setInterval(tick,1000);
</script>
